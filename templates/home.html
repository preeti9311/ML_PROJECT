
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;

    background: linear-gradient(
        135deg,
        #4facfe 0%,
        #00f2fe 100%
    );
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:8px;
    font-size:32px;
}

h2{
    text-align:center;
    color:#64748b;
    margin-bottom:30px;
    font-weight:500;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#1e293b;
    font-weight:600;
}

select,
input{
    width:100%;
    padding:12px 14px;
    border:2px solid #dbeafe;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

select:focus,
input:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 10px rgba(59,130,246,0.3);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    cursor:pointer;

    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2
    );

    color:white;
    font-size:17px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(102,126,234,0.4);
}

.result{
    margin-top:25px;
    padding:18px;

    background:#dcfce7;
    border-left:6px solid #22c55e;

    color:#166534;
    border-radius:10px;

    text-align:center;
    font-size:22px;
    font-weight:bold;
}
</style>


</head>

<body>

<div class="container">

    <h1>Student Exam Performance Indicator</h1>
    <h2>Student Exam Performance Predictor</h2>

    <form action="{{ url_for('predict_datapoints') }}" method="post">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Ethnicity</label>
            <select name="race_ethnicity" required>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Level of Education</label>
            <select name="parental_level_of_education" required>
                <option value="associate's degree">Associate's Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master's Degree</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch</label>
            <select name="lunch" required>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation Course</label>
            <select name="test_preparation_course" required>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
    <label>Reading Score (0 - 100)</label>
    <input
        type="number"
        name="reading_score"
        min="0"
        max="100"
        placeholder="Enter score out of 100"
        required
    >
</div>

<div class="form-group">
    <label>Writing Score (0 - 100)</label>
    <input
        type="number"
        name="writing_score"
        min="0"
        max="100"
        placeholder="Enter score out of 100"
        required
    >
</div>
        <button type="submit" class="btn">Predict Math Score</button>

    </form>

    {% if results %}
    <div class="result">
        Predicted Math Score: {{ results }}
    </div>
    {% endif %}

</div>

</body>
</html>
